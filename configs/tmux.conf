# ==========================================
# 🚀 CUSTOM TAB SHORTCUTS (No Prefix Needed)
# ==========================================

# Alt + 4 -> Session-a kill panni exit aaga
bind -n Super+4 kill-session -t archide
# Super (Windows key) + எண் பயன்படுத்தி பேன்களை மாற்ற
bind -n Super+1 select-pane -t 0
bind -n Super+2 select-pane -t 1
bind -n Super+3 select-pane -t 2



